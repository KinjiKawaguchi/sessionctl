version: 2

builds:
  - id: sessionctl
    main: ./cmd/sessionctl/
    binary: sessionctl
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64

archives:
  - id: sessionctl
    builds:
      - sessionctl
    format: tar.gz
    format_overrides:
      - goos: windows
        format: zip
    name_template: "sessionctl_{{ .Os }}_{{ .Arch }}"

checksum:
  name_template: "checksums.txt"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"
